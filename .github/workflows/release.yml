name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create release archive
        run: |
          zip -r cyclr.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x "src/web/*" \
            -x "docs/*" \
            -x "README.md" \
            -x "LICENSE" \
            -x "node_modules/*" \
            -x "*.log" \
            -x ".DS_Store"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: cyclr.zip