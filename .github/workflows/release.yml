name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js (for Mozilla web-ext)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update manifest version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" manifest.json

      - name: Build Chromium Extension
        run: |
          mkdir -p dist/chrome
          zip -r dist/chrome/cyclr-chrome.zip . \
            -x ".git/*" -x ".github/*" -x "src/web/*" -x "docs/*" \
            -x "README.md" -x "LICENSE" -x "dist/*"

      - name: Build Firefox Extension
        run: |
          mkdir -p dist/firefox

          cp -r src assets manifest.json dist/firefox/

          cd dist/firefox

          jq '
            del(.background.service_worker)
            |
            .background = {
              "scripts": ["src/background/background.js"]
            }
            |
            .browser_specific_settings = {
              "gecko": {
                "id": "cyclr@revanthlol.com"
              }
            }
            |
            .permissions |= map(select(. != "favicon"))
            |
            .web_accessible_resources |= map(.resources |= map(select(. != "_favicon/*")))
          ' manifest.json > manifest-firefox.json

          mv manifest-firefox.json manifest.json

          zip -r ../cyclr-firefox.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/chrome/cyclr-chrome.zip
            dist/cyclr-firefox.zip

      - name: Submit to Mozilla Add-ons (AMO)
        env:
          WEB_EXT_API_KEY: ${{ secrets.WEB_EXT_API_KEY }}
          WEB_EXT_API_SECRET: ${{ secrets.WEB_EXT_API_SECRET }}
        run: |
          npm install -g web-ext
          # The --channel listed flag submits it to the public store for review
          web-ext sign --source-dir dist/firefox --api-key $WEB_EXT_API_KEY --api-secret $WEB_EXT_API_SECRET --channel listed --approval-timeout 0